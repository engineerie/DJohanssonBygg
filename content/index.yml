kontakt:
  title: Om oss
  description: D. Johansson Byggservice drivs av Daniel Johansson i Varberg. Jag erbjuder byggtjänster för både privatpersoner och företag, med fokus på pålitlighet och gott hantverk. Med flera års erfarenhet tar jag mig an renoveringar, tillbyggnader och mindre nybyggen. Mitt mål är alltid att leverera ett bra resultat till ett rimligt pris - utan krångel.
navigation: false
seo:
  title: Snickare i Varberg
  description: Snickare i Varberg för altaner, kök, renovering, tak och byggservice. D. Johansson Byggservice hjälper kunder i Varberg, Veddige och Halland.
testimonials:
  - quote: Kommunikation och bemötande var professionellt från start till mål. Rekommenderas varmt till alla som söker en pålitlig snickare!
    author:
      name: Privatkund
      description: Ny altan
  - quote: Allt utfördes med stor noggrannhet och kvalitet, och vi fick kontinuerlig återkoppling under hela processen.
    author:
      name: Företagskund
      description: Fasadbyte
  - quote: Dom var lösningsorienterad och hittade smarta sätt att möta våra behov utan att kompromissa på kvalitet.
    author:
      name: Privatkund
      description: Köksinstallation
